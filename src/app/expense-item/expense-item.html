<div class="card w-75 mb-2">
  <div class="card-body d-flex justify-content-between align-items-center">
    <div>
    <h5 class="card-title">{{ expense.title }}</h5>
    <p class="card-text" [style.color]="categoryColors[expense.category]">{{ expense.category }}</p>
    </div>
    <div class="text-end">
    <p [style.color]="expense.amount < 100 ? 'green' : 'red'">${{ expense.amount }}</p>
    <a href="#" class="btn btn-danger btn-sm" (click)="deleteExpense()">Delete</a>
  </div>
</div>
</div>
